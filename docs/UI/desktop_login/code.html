<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WMS Grid Locator - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ba1a1a",
                      "surface-bright": "#f8f9ff",
                      "primary-container": "#1e293b",
                      "surface-container": "#e5eeff",
                      "on-secondary": "#ffffff",
                      "on-error": "#ffffff",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#bcc7de",
                      "secondary-fixed": "#ffdbca",
                      "on-tertiary": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed": "#002109",
                      "primary": "#091426",
                      "tertiary-fixed-dim": "#4ae176",
                      "on-primary-fixed-variant": "#3c475a",
                      "tertiary-fixed": "#6bff8f",
                      "on-secondary-fixed": "#341100",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#eff4ff",
                      "surface-container-high": "#dce9ff",
                      "inverse-surface": "#213145",
                      "on-primary-fixed": "#111c2d",
                      "inverse-on-surface": "#eaf1ff",
                      "inverse-primary": "#bcc7de",
                      "surface-container-highest": "#d3e4fe",
                      "tertiary-container": "#003010",
                      "primary-fixed": "#d8e3fb",
                      "on-tertiary-fixed-variant": "#005321",
                      "background": "#f8f9ff",
                      "surface-dim": "#cbdbf5",
                      "on-secondary-container": "#5c2400",
                      "on-surface": "#0b1c30",
                      "secondary-fixed-dim": "#ffb690",
                      "tertiary": "#001906",
                      "on-tertiary-container": "#00a64a",
                      "outline-variant": "#c5c6cd",
                      "surface-variant": "#d3e4fe",
                      "secondary": "#9d4300",
                      "surface": "#f8f9ff",
                      "on-surface-variant": "#45474c",
                      "error-container": "#ffdad6",
                      "surface-tint": "#545f73",
                      "outline": "#75777d",
                      "on-secondary-fixed-variant": "#783200",
                      "on-primary-container": "#8590a6",
                      "on-background": "#0b1c30"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "8px",
                      "sm": "12px",
                      "md": "16px",
                      "xl": "32px",
                      "base": "4px",
                      "touch-target": "48px",
                      "gutter": "16px",
                      "container-margin": "24px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "body-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "display-lg": ["Inter"],
                      "code-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "headline-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "title-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "code-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        .industrial-pattern {
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .inner-press:active {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.15);
            transform: scale(0.98);
        }
        .role-badge {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-md industrial-pattern relative overflow-hidden">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">

</div>
<!-- Main Login Container -->
<main class="relative z-10 w-full max-w-[480px]">
<div class="bg-surface-container-lowest border border-outline-variant shadow-lg rounded-xl overflow-hidden">
<!-- Top Branding Stripe -->
<div class="h-1.5 bg-secondary w-full"></div>
<div class="p-xl md:p-lg space-y-xl">
<!-- Logo & Header -->
<header class="flex flex-col items-center text-center space-y-md">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-[40px]">grid_view</span>
</div>
<div class="space-y-base">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">WMS Grid Locator</h1>
<p class="font-body-md text-on-surface-variant">Warehouse Zone Alpha-9 Security Portal</p>
</div>
</header>
<!-- Role Selector (Industrial Tabs) -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Select Access Role</label>
<div class="grid grid-cols-3 gap-xs p-base bg-surface-container-low rounded-lg border border-outline-variant">
<button class="role-badge flex flex-col items-center justify-center py-sm rounded-md bg-secondary-container text-on-secondary-container shadow-sm border border-secondary/20" id="role-admin" onclick="selectRole('Admin')">
<span class="material-symbols-outlined mb-xs" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
<span class="font-label-md text-label-md">Admin</span>
</button>
<button class="role-badge flex flex-col items-center justify-center py-sm rounded-md text-on-surface-variant hover:bg-surface-container-high" id="role-logistics" onclick="selectRole('Logistics')">
<span class="material-symbols-outlined mb-xs">local_shipping</span>
<span class="font-label-md text-label-md">Logistics</span>
</button>
<button class="role-badge flex flex-col items-center justify-center py-sm rounded-md text-on-surface-variant hover:bg-surface-container-high" id="role-consumer" onclick="selectRole('Consumer')">
<span class="material-symbols-outlined mb-xs">person</span>
<span class="font-label-md text-label-md">User</span>
</button>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-lg" onsubmit="return false;">
<div class="space-y-md">
<div class="relative group">
<label class="absolute -top-2.5 left-3 px-1 bg-surface-container-lowest text-[12px] font-semibold text-outline group-focus-within:text-secondary transition-colors" for="username">Username</label>
<div class="flex items-center border-2 border-outline-variant rounded-lg focus-within:border-secondary transition-all">
<div class="px-md text-outline">
<span class="material-symbols-outlined">account_circle</span>
</div>
<input class="w-full h-[56px] bg-transparent border-none focus:ring-0 font-body-md text-on-surface" id="username" placeholder="Enter employee ID" type="text"/>
</div>
</div>
<div class="relative group">
<label class="absolute -top-2.5 left-3 px-1 bg-surface-container-lowest text-[12px] font-semibold text-outline group-focus-within:text-secondary transition-colors" for="password">Password</label>
<div class="flex items-center border-2 border-outline-variant rounded-lg focus-within:border-secondary transition-all">
<div class="px-md text-outline">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full h-[56px] bg-transparent border-none focus:ring-0 font-body-md text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="px-md text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-sm">
<button class="inner-press w-full h-[56px] bg-secondary text-on-secondary rounded-lg font-title-lg text-title-lg flex items-center justify-center gap-sm shadow-md transition-transform active:scale-[0.98]" type="submit">
<span>Authenticate Access</span>
<span class="material-symbols-outlined">login</span>
</button>
</div>
</form>
<!-- Footer Utilities -->
<footer class="flex items-center justify-between pt-md border-t border-outline-variant">
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot ID?</a>
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">help_outline</span>
<span class="font-label-md text-label-md">IT Support</span>
</div>
</footer>
</div>
</div>
<!-- System Status Bar -->
<div class="mt-md flex justify-center">
<div class="px-md py-xs bg-surface-container-high rounded-full flex items-center gap-sm border border-outline-variant">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tertiary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-on-tertiary-container"></span>
</span>
<span class="font-code-md text-code-md text-on-surface-variant uppercase">Grid Status: Online</span>
</div>
</div>
</main>
<!-- Decorative Industrial Element (Bottom Right) -->
<div class="hidden lg:block absolute bottom-xl right-xl">
<div class="w-48 h-48 opacity-10 border-[16px] border-primary-container rounded-full flex items-center justify-center">
<div class="w-24 h-24 border-[8px] border-primary-container rounded-full"></div>
</div>
</div>
<script>
        function selectRole(role) {
            // Reset all roles
            const roles = ['Admin', 'Logistics', 'Consumer'];
            roles.forEach(r => {
                const btn = document.getElementById(`role-${r.toLowerCase()}`);
                btn.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'shadow-sm', 'border', 'border-secondary/20');
                btn.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                btn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            });

            // Set active role
            const activeBtn = document.getElementById(`role-${role.toLowerCase()}`);
            activeBtn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'shadow-sm', 'border', 'border-secondary/20');
            activeBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
            activeBtn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
            
            console.log(`Role selected: ${role}`);
        }

        // Simple button press effect for login
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('mousedown', () => {
            loginBtn.classList.add('scale-95', 'bg-secondary-fixed-dim');
        });
        loginBtn.addEventListener('mouseup', () => {
            loginBtn.classList.remove('scale-95', 'bg-secondary-fixed-dim');
        });
        loginBtn.addEventListener('mouseleave', () => {
            loginBtn.classList.remove('scale-95', 'bg-secondary-fixed-dim');
        });
    </script>
</body></html>
